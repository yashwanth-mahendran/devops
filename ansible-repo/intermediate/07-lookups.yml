# Query vs Lookup
# lookup returns string by default, query returns list
- name: Query vs Lookup
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Using query (returns list)
      debug:
        var: item
      loop: "{{ query('sequence', 'start=1 end=3') }}"

    - name: Using lookup with wantlist
      debug:
        var: item
      loop: "{{ lookup('sequence', 'start=1 end=3', wantlist=True) }}"
