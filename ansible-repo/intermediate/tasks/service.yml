---
# Service tasks used in loops
# Include with: include_tasks: tasks/service.yml

- name: Ensure {{ service_name }} is installed
  package:
    name: "{{ service_name }}"
    state: present

- name: Ensure {{ service_name }} is running
  service:
    name: "{{ service_name }}"
    state: started
    enabled: yes
  ignore_errors: yes
