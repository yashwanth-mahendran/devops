---
# 06-molecule-testing.yml
# Guide to testing Ansible roles with Molecule

# This playbook serves as documentation for Molecule testing

- name: Molecule Testing Guide
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Molecule Overview
      debug:
        msg: |
          Molecule is a testing framework for Ansible roles.
          
          Installation:
            pip install molecule molecule-docker ansible-lint yamllint
          
          Initialize role with Molecule:
            molecule init role my_role
          
          Add Molecule to existing role:
            cd roles/my_role
            molecule init scenario
          
          Run tests:
            molecule test              # Full test cycle
            molecule create            # Create instances
            molecule converge          # Run playbook
            molecule verify            # Run tests
            molecule destroy           # Destroy instances
            molecule login             # SSH into instance


