---
# 05-custom-modules.yml
# Demonstrates creating and using custom modules

# Custom Module Location:
# - ./library/ (in playbook directory)
# - ~/.ansible/plugins/modules/
# - /usr/share/ansible/plugins/modules/
# - Configured in ansible.cfg

- name: Custom Module Examples
  hosts: localhost
  gather_facts: no

  tasks:
    # Example 1: Using a simple custom module
    # The module file would be in library/my_module.py
    - name: Use custom module
      my_module:
        name: test
        state: present
      register: result

    - name: Show result
      debug:
        var: result


