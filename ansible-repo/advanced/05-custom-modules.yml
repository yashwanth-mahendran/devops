# Example 5: Action Plugin (for complex module behavior)
# Location: action_plugins/my_action.py

- name: Action Plugin Demo
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Module with custom action plugin
      my_action_module:
        param1: value1


# Enable custom plugins in ansible.cfg:
# [defaults]
# library = ./library
# filter_plugins = ./filter_plugins
# lookup_plugins = ./lookup_plugins
# callback_plugins = ./callback_plugins
# action_plugins = ./action_plugins
