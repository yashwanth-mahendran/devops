# Example 2: Custom Filter Plugin
# Location: filter_plugins/my_filters.py

- name: Custom Filter Demo
  hosts: localhost
  gather_facts: no

  vars:
    my_data: "hello world"

  tasks:
    - name: Use custom filter
      debug:
        msg: "{{ my_data | my_custom_filter }}"


