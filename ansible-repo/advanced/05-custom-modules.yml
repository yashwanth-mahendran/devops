# Example 3: Custom Lookup Plugin
# Location: lookup_plugins/my_lookup.py

- name: Custom Lookup Demo
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Use custom lookup
      debug:
        msg: "{{ lookup('my_lookup', 'some_key') }}"


