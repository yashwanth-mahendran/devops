# DestinationRule for compliance-scanner
# Configures mTLS, connection pooling, and circuit breaker

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: compliance-scanner
  namespace: compliance
  labels:
    app.kubernetes.io/name: compliance-scanner
    app.kubernetes.io/component: istio-networking
spec:
  host: compliance-scanner
  trafficPolicy:
    # mTLS configuration
    tls:
      mode: ISTIO_MUTUAL  # Use Istio's auto-generated certs

    # Connection pool settings
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxRetries: 3
        idleTimeout: 60s

    # Circuit breaker / Outlier detection
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
      minHealthPercent: 30
      splitExternalLocalOriginErrors: true
      consecutiveLocalOriginFailures: 5
      consecutiveGatewayErrors: 3

  # Subset definitions for blue/green deployments
  subsets:
    - name: blue
      labels:
        version: blue
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
    - name: green
      labels:
        version: green
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 50  # Lower during canary

---
# DestinationRule for external AWS services (via egress)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: aws-tls-origination
  namespace: compliance
  labels:
    app.kubernetes.io/name: compliance-scanner
    app.kubernetes.io/component: istio-networking
spec:
  host: "*.amazonaws.com"
  trafficPolicy:
    tls:
      mode: SIMPLE  # TLS origination for AWS API calls
    connectionPool:
      tcp:
        maxConnections: 500
        connectTimeout: 5s
      http:
        http2MaxRequests: 2000
        maxRetries: 3
