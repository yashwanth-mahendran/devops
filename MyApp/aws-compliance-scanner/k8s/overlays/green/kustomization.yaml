apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: compliance

resources:
  - ../../base

# ── GREEN slot — new version under canary / staging ──────────────────────────
nameSuffix: "-green"

patches:
  - path: deployment-patch.yaml
  - path: service-patch.yaml

images:
  - name: "123456789012.dkr.ecr.us-east-1.amazonaws.com/compliance-scanner"
    newTag: "GREEN_IMAGE_TAG"      # replaced by CI pipeline during promotion

commonLabels:
  slot: green
  track: canary
