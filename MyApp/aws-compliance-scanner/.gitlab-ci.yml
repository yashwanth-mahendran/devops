# ────────────────────────────────────────────────────────────────────────────
#  GitLab CI/CD Pipeline — AWS Compliance Scanner
#  Stages: lint → test → build → scan → deploy-green → verify → promote/rollback
# ────────────────────────────────────────────────────────────────────────────
image: python:3.12-slim

variables:
  # ── Registry ──────────────────────────────────────────────────────────────
  ECR_REGISTRY:    "123456789012.dkr.ecr.us-east-1.amazonaws.com"
  IMAGE_NAME:      "compliance-scanner"
  IMAGE_TAG:       "${CI_COMMIT_SHORT_SHA}"
  BLUE_IMAGE_TAG:  "${CI_COMMIT_SHORT_SHA}"
  GREEN_IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

  # ── AWS ───────────────────────────────────────────────────────────────────
  AWS_DEFAULT_REGION:  "us-east-1"
  LAMBDA_PREFIX:       "compliance-check"
  LAMBDA_NAMES: >
    cfn-drift vpc-flow-logs audit-manager s3-encryption
    iam-mfa cloudtrail sg-unrestricted-ssh guardduty

  # ── EKS / ArgoCD ─────────────────────────────────────────────────────────
  EKS_CLUSTER_NAME:    "compliance-eks-prod"
  ARGOCD_SERVER:       "argocd.internal.company.com"
  ARGOCD_APP_BLUE:     "compliance-scanner-blue"
  ARGOCD_APP_GREEN:    "compliance-scanner-green"

  # ── Blue/Green config ─────────────────────────────────────────────────────
  CANARY_WEIGHT:   "10"           # % traffic to green during canary
  CANARY_BAKE_SEC: "300"          # seconds to observe canary
  ERROR_THRESHOLD: "1"            # % max acceptable error rate

  # ── Docker ───────────────────────────────────────────────────────────────
  DOCKER_BUILDKIT: "1"

stages:
  - lint
  - test
  - build
  - security-scan
  - deploy-green
  - verify-green
  - promote-or-rollback
  - deploy-lambda

# ── Cache shared across stages ───────────────────────────────────────────────
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .venv/
    - .pip-cache/

# ── Common before_script ─────────────────────────────────────────────────────
.python-setup: &python-setup
  before_script:
    - pip install --quiet virtualenv
    - virtualenv .venv
    - source .venv/bin/activate
    - pip install --quiet -r fastapi-app/requirements.txt
    - pip install --quiet pytest pytest-asyncio httpx ruff bandit safety

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: lint
# ═══════════════════════════════════════════════════════════════════════════

lint:ruff:
  stage: lint
  <<: *python-setup
  script:
    - ruff check fastapi-app/app/ lambda-functions/
    - ruff format --check fastapi-app/app/ lambda-functions/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

lint:yaml:
  stage: lint
  image: cytopia/yamllint
  script:
    - yamllint k8s/ argocd/ -d relaxed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: test
# ═══════════════════════════════════════════════════════════════════════════

test:unit:
  stage: test
  <<: *python-setup
  script:
    - cd fastapi-app
    - pytest tests/unit/ -v --tb=short --junitxml=../junit-unit.xml
  coverage: '/^TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: junit-unit.xml
    paths:
      - junit-unit.xml
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

test:integration:
  stage: test
  <<: *python-setup
  services:
    - name: amazon/dynamodb-local
      alias: dynamodb-local
  variables:
    AWS_ACCESS_KEY_ID:     "dummy"
    AWS_SECRET_ACCESS_KEY: "dummy"
    AWS_DEFAULT_REGION:    "us-east-1"
    DYNAMODB_ENDPOINT:     "http://dynamodb-local:8000"
  script:
    - cd fastapi-app
    - pytest tests/integration/ -v --junitxml=../junit-integration.xml
  artifacts:
    reports:
      junit: junit-integration.xml
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: build
# ═══════════════════════════════════════════════════════════════════════════

build:fastapi-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # Authenticate to ECR
    - mkdir -p /kaniko/.docker
    - |
      printf '{"credHelpers": {"%s": "ecr-login"}}' "$ECR_REGISTRY" \
        > /kaniko/.docker/config.json
    # Build and push with Kaniko (no Docker daemon required — safe in k8s)
    - /kaniko/executor
        --context="${CI_PROJECT_DIR}/fastapi-app"
        --dockerfile="${CI_PROJECT_DIR}/fastapi-app/Dockerfile"
        --destination="${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
        --destination="${ECR_REGISTRY}/${IMAGE_NAME}:latest"
        --cache=true
        --cache-ttl=24h
        --build-arg="BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        --build-arg="GIT_COMMIT=${CI_COMMIT_SHA}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build:lambda-packages:
  stage: build
  <<: *python-setup
  script:
    - |
      for check in cfn-drift vpc-flow-logs audit-manager s3-encryption iam-mfa cloudtrail sg-unrestricted-ssh guardduty; do
        dir="lambda-functions/${check}-check"
        echo "Packaging $dir..."
        pushd "$dir"
        pip install -r requirements.txt -t ./package --quiet 2>/dev/null || true
        cp handler.py ./package/
        pushd package
        zip -r "../${check}.zip" . -q
        popd
        popd
      done
  artifacts:
    paths:
      - lambda-functions/**/*.zip
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: security-scan
# ═══════════════════════════════════════════════════════════════════════════

security:sast:
  stage: security-scan
  <<: *python-setup
  script:
    - bandit -r fastapi-app/app/ lambda-functions/ -f json -o bandit-report.json || true
    - cat bandit-report.json
  artifacts:
    reports:
      sast: bandit-report.json
    paths:
      - bandit-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

security:container-scan:
  stage: security-scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image
        --format template
        --template "@/contrib/gitlab.tpl"
        --output container-scan.json
        --severity HIGH,CRITICAL
        --exit-code 0
        "${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
  artifacts:
    reports:
      container_scanning: container-scan.json
    expire_in: 7 days
  needs:
    - build:fastapi-image
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

security:dependency-check:
  stage: security-scan
  <<: *python-setup
  script:
    - safety check -r fastapi-app/requirements.txt --json --output safety-report.json || true
  artifacts:
    paths:
      - safety-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: deploy-green
# ═══════════════════════════════════════════════════════════════════════════

deploy:green:
  stage: deploy-green
  image: alpine/k8s:1.29.2
  before_script:
    - apk add --no-cache curl jq
    # Install ArgoCD CLI
    - curl -sSL -o /usr/local/bin/argocd
        "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
    - chmod +x /usr/local/bin/argocd
    # Authenticate
    - argocd login $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --grpc-web
    # Configure kubectl
    - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    # ── 1. Patch green overlay with new image tag ──────────────────────────
    - |
      cd k8s/overlays/green
      kustomize edit set image \
        "${ECR_REGISTRY}/${IMAGE_NAME}=${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

    # ── 2. Update GREEN_IMAGE_TAG label in kustomization ──────────────────
    - |
      sed -i "s|GREEN_IMAGE_TAG|${IMAGE_TAG}|g" deployment-patch.yaml

    # ── 3. Commit changes back to repo (GitOps) ───────────────────────────
    - |
      git config user.email "ci@company.com"
      git config user.name  "GitLab CI"
      git add k8s/overlays/green/
      git commit -m "deploy(green): image=${IMAGE_TAG} [skip ci]"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main

    # ── 4. Trigger ArgoCD sync for green app ──────────────────────────────
    - argocd app sync $ARGOCD_APP_GREEN --prune --timeout 180
    - argocd app wait $ARGOCD_APP_GREEN --health --timeout 180

    # ── 5. Start canary: shift 10% traffic to green via Istio patch ───────
    - |
      kubectl patch virtualservice compliance-scanner-vs -n compliance \
        --type=json -p="[
          {\"op\":\"replace\",\"path\":\"/spec/http/1/route/0/weight\",\"value\":$((100-CANARY_WEIGHT))},
          {\"op\":\"replace\",\"path\":\"/spec/http/1/route/1/weight\",\"value\":${CANARY_WEIGHT}}
        ]"
      echo "CANARY_STARTED=true" >> canary.env
      echo "CANARY_START_TIME=$(date +%s)" >> canary.env
  artifacts:
    reports:
      dotenv: canary.env
    expire_in: 1 day
  environment:
    name: production/green
    url: https://compliance-scanner.internal.company.com
  needs:
    - build:fastapi-image
    - security:container-scan
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: verify-green
# ═══════════════════════════════════════════════════════════════════════════

verify:canary:
  stage: verify-green
  image: amazon/aws-cli
  before_script:
    - yum install -y jq bc
  script:
    - echo "Waiting ${CANARY_BAKE_SEC}s for canary observation..."
    - sleep $CANARY_BAKE_SEC

    # ── Pull error rate from CloudWatch (Istio telemetry) ─────────────────
    - |
      END_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      START_TIME=$(date -u -d "${CANARY_BAKE_SEC} seconds ago" +%Y-%m-%dT%H:%M:%SZ)

      # Example: query CW Insights or Prometheus — simplified for illustration
      # In production, query Prometheus via promtool or CW GetMetricData
      ERRORS=$(aws cloudwatch get-metric-statistics \
        --namespace "istio_requests_total" \
        --metric-name "5xx" \
        --dimensions Name=destination_app,Value=compliance-scanner \
                     Name=version,Value=green \
        --statistics Sum \
        --start-time "$START_TIME" \
        --end-time "$END_TIME" \
        --period $CANARY_BAKE_SEC \
        --query "Datapoints[0].Sum" \
        --output text 2>/dev/null || echo "0")

      TOTAL=$(aws cloudwatch get-metric-statistics \
        --namespace "istio_requests_total" \
        --metric-name "total" \
        --dimensions Name=destination_app,Value=compliance-scanner \
                     Name=version,Value=green \
        --statistics Sum \
        --start-time "$START_TIME" \
        --end-time "$END_TIME" \
        --period $CANARY_BAKE_SEC \
        --query "Datapoints[0].Sum" \
        --output text 2>/dev/null || echo "1")

      ERRORS=${ERRORS:-0}
      TOTAL=${TOTAL:-1}
      ERROR_RATE=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)
      echo "Green error rate: ${ERROR_RATE}%"

      if (( $(echo "$ERROR_RATE > $ERROR_THRESHOLD" | bc -l) )); then
        echo "ERROR_RATE_OK=false" >> verify.env
        echo "ERROR_MSG=Error rate ${ERROR_RATE}% exceeds threshold ${ERROR_THRESHOLD}%" >> verify.env
      else
        echo "ERROR_RATE_OK=true" >> verify.env
      fi

    # ── Smoke test: hit healthz on green ──────────────────────────────────
    - |
      HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
        -H "x-app-slot: green" \
        https://compliance-scanner.internal.company.com/healthz)
      if [ "$HTTP_CODE" != "200" ]; then
        echo "ERROR_RATE_OK=false" >> verify.env
        echo "ERROR_MSG=Health check failed: HTTP $HTTP_CODE" >> verify.env
      fi

  artifacts:
    reports:
      dotenv: verify.env
    expire_in: 1 day
  needs:
    - deploy:green
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: promote-or-rollback
# ═══════════════════════════════════════════════════════════════════════════

promote:blue-green-swap:
  stage: promote-or-rollback
  image: alpine/k8s:1.29.2
  before_script:
    - apk add --no-cache curl jq
    - curl -sSL -o /usr/local/bin/argocd
        "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
    - chmod +x /usr/local/bin/argocd
    - argocd login $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --grpc-web
    - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "Promoting green → blue (full traffic cutover)"

    # ── 1. Shift 100% traffic to green ────────────────────────────────────
    - |
      kubectl patch virtualservice compliance-scanner-vs -n compliance \
        --type=json -p='[
          {"op":"replace","path":"/spec/http/1/route/0/weight","value":0},
          {"op":"replace","path":"/spec/http/1/route/1/weight","value":100}
        ]'

    # ── 2. Wait 30s to confirm stability ──────────────────────────────────
    - sleep 30

    # ── 3. Update blue overlay to new green image (blue becomes new green) -
    - |
      cd k8s/overlays/blue
      kustomize edit set image \
        "${ECR_REGISTRY}/${IMAGE_NAME}=${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      sed -i "s|BLUE_IMAGE_TAG|${IMAGE_TAG}|g" deployment-patch.yaml

    # ── 4. Commit and push ────────────────────────────────────────────────
    - |
      git config user.email "ci@company.com"
      git config user.name  "GitLab CI"
      git add k8s/overlays/blue/
      git commit -m "promote(blue): image=${IMAGE_TAG} [skip ci]"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main

    # ── 5. Sync blue ──────────────────────────────────────────────────────
    - argocd app sync $ARGOCD_APP_BLUE --prune --timeout 180
    - argocd app wait $ARGOCD_APP_BLUE --health --timeout 180

    # ── 6. Route back to blue (now running new code) ──────────────────────
    - |
      kubectl patch virtualservice compliance-scanner-vs -n compliance \
        --type=json -p='[
          {"op":"replace","path":"/spec/http/1/route/0/weight","value":100},
          {"op":"replace","path":"/spec/http/1/route/1/weight","value":0}
        ]'

    # ── 7. Tag image as stable ────────────────────────────────────────────
    - |
      aws ecr batch-delete-image --repository-name $IMAGE_NAME --image-ids imageTag=stable
      MANIFEST=$(aws ecr batch-get-image --repository-name $IMAGE_NAME \
        --image-ids imageTag=${IMAGE_TAG} --query 'images[].imageManifest' --output text)
      aws ecr put-image --repository-name $IMAGE_NAME \
        --image-tag stable --image-manifest "$MANIFEST"

    - echo "Promotion complete. Blue is now running ${IMAGE_TAG}"
  environment:
    name: production/blue
    url: https://compliance-scanner.internal.company.com
  needs:
    - verify:canary
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

rollback:green:
  stage: promote-or-rollback
  image: alpine/k8s:1.29.2
  before_script:
    - apk add --no-cache curl jq
    - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "ROLLBACK triggered — shifting 100% traffic back to blue"
    - |
      kubectl patch virtualservice compliance-scanner-vs -n compliance \
        --type=json -p='[
          {"op":"replace","path":"/spec/http/1/route/0/weight","value":100},
          {"op":"replace","path":"/spec/http/1/route/1/weight","value":0}
        ]'
    # Alert
    - |
      curl -X POST "${SLACK_WEBHOOK_URL}" \
        -H 'Content-type: application/json' \
        --data "{\"text\":\"🚨 ROLLBACK: compliance-scanner green deployment ${IMAGE_TAG} failed canary → reverted to blue. Error: ${ERROR_MSG}\"}"
  environment:
    name: production/rollback
  needs:
    - verify:canary
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: deploy-lambda
# Deploys all compliance-check Lambda functions using ZIP packages.
# ═══════════════════════════════════════════════════════════════════════════

deploy:lambda:
  stage: deploy-lambda
  image: amazon/aws-cli
  script:
    - |
      for check in cfn-drift vpc-flow-logs audit-manager s3-encryption iam-mfa cloudtrail sg-unrestricted-ssh guardduty; do
        FUNCTION_NAME="${LAMBDA_PREFIX}-${check}"
        ZIP_FILE="lambda-functions/${check}-check/${check}.zip"

        echo "Deploying ${FUNCTION_NAME}..."
        aws lambda update-function-code \
          --function-name "$FUNCTION_NAME" \
          --zip-file "fileb://${ZIP_FILE}" \
          --region "$AWS_DEFAULT_REGION"

        # Wait until update is complete
        aws lambda wait function-updated \
          --function-name "$FUNCTION_NAME" \
          --region "$AWS_DEFAULT_REGION"

        # Publish a new version
        NEW_VERSION=$(aws lambda publish-version \
          --function-name "$FUNCTION_NAME" \
          --description "CI deploy ${IMAGE_TAG}" \
          --query 'Version' --output text)

        # Update alias :live → new version (10% canary → 100% after FastAPI canary passes)
        aws lambda update-alias \
          --function-name "$FUNCTION_NAME" \
          --name live \
          --function-version "$NEW_VERSION" \
          --region "$AWS_DEFAULT_REGION" || \
        aws lambda create-alias \
          --function-name "$FUNCTION_NAME" \
          --name live \
          --function-version "$NEW_VERSION" \
          --region "$AWS_DEFAULT_REGION"

        echo "Lambda ${FUNCTION_NAME} updated to version ${NEW_VERSION}"
      done
  needs:
    - build:lambda-packages
    - promote:blue-green-swap
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
