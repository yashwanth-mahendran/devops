apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: compliance-scanner-green
  namespace: argocd
  labels:
    slot: green
    track: canary
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: compliance-deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack:    compliance-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: compliance-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: compliance-platform

  source:
    repoURL:        https://gitlab.company.com/platform/aws-compliance-scanner.git
    targetRevision: main
    path:           k8s/overlays/green

  destination:
    server:    https://kubernetes.default.svc
    namespace: compliance

  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration:    5s
        maxDuration: 1m
        factor:      2

  revisionHistoryLimit: 3

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
