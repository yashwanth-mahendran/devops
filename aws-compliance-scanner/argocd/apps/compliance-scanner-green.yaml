# ArgoCD Application: compliance-scanner-green (apps/ directory entry)
# This file is referenced by the App-of-Apps (argocd/app-of-apps.yaml)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: compliance-scanner-green
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: compliance-platform
    deployment/slot: green
    deployment/track: canary
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: compliance-platform

  source:
    repoURL: https://gitlab.company.com/platform/aws-compliance-scanner.git
    targetRevision: HEAD
    path: k8s/overlays/green

  destination:
    server: https://kubernetes.default.svc
    namespace: compliance

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  revisionHistoryLimit: 5
